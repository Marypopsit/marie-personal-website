<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marie Robin | AI System Designer</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,600&family=Inter:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --void-bg: #030406; 
            --lime-green: #D4FB06; 
            --lime-glow: rgba(212, 251, 6, 0.2);
            --grid-line: rgba(100, 110, 130, 0.2); 
            --text-main: #f4f5f9; 
            --text-muted: #6b7280; 
            
            --font-serif: "Playfair Display", serif; 
            --font-sans: "Inter", sans-serif; 
            --font-mono: "Space Mono", monospace;
        }

        * { box-sizing: border-box; cursor: none; margin: 0; padding: 0; }

        body {
            background-color: var(--void-bg);
            color: var(--text-main);
            font-family: var(--font-sans);
            height: 100vh;
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        /* Noise Overlay */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9998; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Custom Cursor */
        #cursor-dot, #cursor-ring {
            position: fixed; top: 0; left: 0; pointer-events: none;
            z-index: 9999; transform: translate(-50%, -50%);
        }
        #cursor-dot {
            width: 8px; height: 8px; background-color: var(--lime-green);
            border-radius: 50%; box-shadow: 0 0 20px var(--lime-glow);
        }
        #cursor-ring {
            width: 40px; height: 40px; border: 1px solid var(--lime-green);
            border-radius: 50%; opacity: 0.5;
        }

        /* Main Container */
        .container {
            position: relative; width: 90%; max-width: 1200px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
            align-items: center; z-index: 10;
        }

        /* Left Column: Text */
        .left {
            display: flex; flex-direction: column; gap: 40px;
        }

        h1 {
            font-family: var(--font-serif); font-size: 3.5rem;
            font-weight: 600; font-style: italic; line-height: 1.1;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--lime-green), #7fd4e8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p.description {
            font-size: 1.1rem; line-height: 1.6; color: var(--text-muted);
            max-width: 500px;
        }

        .cta-buttons {
            display: flex; gap: 20px; margin-top: 20px;
        }

        .cta-button {
            padding: 12px 32px; font-size: 1rem; border: none;
            border-radius: 4px; cursor: pointer; transition: all 0.3s ease;
            font-family: var(--font-sans); font-weight: 600;
            text-decoration: none; display: inline-block;
        }

        .cta-primary {
            background-color: var(--lime-green); color: var(--void-bg);
            box-shadow: 0 0 30px rgba(212, 251, 6, 0.4);
        }

        .cta-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(212, 251, 6, 0.6);
        }

        .cta-secondary {
            border: 1px solid var(--lime-green); color: var(--lime-green);
        }

        .cta-secondary:hover {
            background-color: rgba(212, 251, 6, 0.1);
        }

        /* Right Column: Memory Gallery */
        .right {
            position: relative; height: 500px;
        }

        .memory-item {
            position: absolute; width: 280px; background: rgba(212, 251, 6, 0.05);
            border: 1px solid var(--grid-line); border-radius: 8px;
            overflow: hidden; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease; cursor: pointer;
        }

        .memory-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 48px rgba(212, 251, 6, 0.2);
            border-color: var(--lime-green);
        }

        .memory-item img, .memory-item video {
            width: 100%; height: 200px; object-fit: cover; display: block;
        }

        .memory-info {
            padding: 15px; color: var(--text-main); font-size: 0.95rem;
        }

        .memory-info h3 {
            font-family: var(--font-serif); font-size: 1.2rem;
            font-style: italic; margin-bottom: 5px; color: var(--lime-green);
        }

        .memory-info p {
            font-size: 0.85rem; color: var(--text-muted);
        }

        /* Positioning */
        .memory-1 { top: 0; left: 0; }
        .memory-2 { top: 40px; left: 200px; z-index: 2; }
        .memory-3 { top: 220px; left: 80px; }
        .memory-4 { top: 180px; left: 280px; z-index: 3; }

        /* Responsive */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            h1 { font-size: 2.5rem; }
            .right { height: 400px; }
        }

        @media (max-width: 640px) {
            .container { width: 95%; }
            h1 { font-size: 1.8rem; }
            p.description { font-size: 1rem; }
            .memory-item { width: 200px; }
            .right { height: 300px; }
        }
    </style>
</head>

<body>
    <!-- Noise Overlay -->
    <div class="noise-overlay"></div>

    <!-- Custom Cursor -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- Main Content -->
    <div class="container">
        <!-- Left: Text Content -->
        <div class="left">
            <h1>Marie Robin</h1>
            <p class="description">
                AI system architect designing the future of work. I build neural memory systems that amplify human creativity and unlock the intellectual capital hidden inside teams.
            </p>
            <div class="cta-buttons">
                <button class="cta-button cta-primary" onclick="window.open('https://fleetforward.tech', '_blank')">Explore Fleet Forward</button>
                <button class="cta-button cta-secondary" onclick="window.open('https://marierobin.substack.com', '_blank')">Read My Newsletter</button>
            </div>
        </div>

        <!-- Right: Memory Gallery -->
        <div class="right">
            <div class="memory-item memory-1">
                <img src="assets/Marie Pro.jpeg" alt="Marie Robin">
                <div class="memory-info">
                    <h3>Now</h3>
                    <p>Building the future of AI systems</p>
                </div>
            </div>
            <div class="memory-item memory-2">
                <video controls><source src="videos/2016 Spain.mp4" type="video/mp4"></video>
                <div class="memory-info">
                    <h3>2016</h3>
                    <p>Spain</p>
                </div>
            </div>
            <div class="memory-item memory-3">
                <video controls><source src="videos/1990 Spain.mp4" type="video/mp4"></video>
                <div class="memory-info">
                    <h3>1990</h3>
                    <p>Spain</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Custom Cursor
        const cursorDot = document.getElementById('cursor-dot');
        const cursorRing = document.getElementById('cursor-ring');

        document.addEventListener('mousemove', (e) => {
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
            cursorRing.style.left = e.clientX + 'px';
            cursorRing.style.top = e.clientY + 'px';
        });

        document.addEventListener('mousedown', () => {
            cursorDot.style.transform = 'translate(-50%, -50%) scale(1.5)';
            cursorRing.style.borderColor = 'rgba(212, 251, 6, 0.8)';
        });

        document.addEventListener('mouseup', () => {
            cursorDot.style.transform = 'translate(-50%, -50%) scale(1)';
            cursorRing.style.borderColor = 'var(--lime-green)';
        });

        // Hover Effects
        document.querySelectorAll('.memory-item').forEach(item => {
            item.addEventListener('mouseenter', () => {
                item.style.zIndex = 10;
            });
        });
    </script>
</body>

</html>
