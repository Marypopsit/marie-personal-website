<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marie Robin | AI System Designer</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400;1,600&family=Inter:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --void-bg: #030406; 
            --lime-green: #D4FB06; 
            --lime-glow: rgba(212, 251, 6, 0.2);
            --grid-line: rgba(100, 110, 130, 0.2); 
            --text-main: #f4f5f9; 
            --text-muted: #6b7280; 
            
            --font-serif: "Playfair Display", serif; 
            --font-sans: "Inter", sans-serif; 
            --font-mono: "Space Mono", monospace;
        }

        * { box-sizing: border-box; cursor: none; margin: 0; padding: 0; }

        body {
            background-color: var(--void-bg);
            color: var(--text-main);
            font-family: var(--font-sans);
            height: 100vh;
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        /* Noise Overlay */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9998; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Custom Cursor */
        #cursor-dot, #cursor-ring {
            position: fixed; top: 0; left: 0; pointer-events: none;
            z-index: 9999; transform: translate(-50%, -50%);
        }
        #cursor-dot {
            width: 6px; height: 6px; background-color: var(--lime-green);
            border-radius: 50%; opacity: 0.8;
        }
        #cursor-ring {
            width: 24px; height: 24px; border: 1px solid var(--lime-green);
            border-radius: 50%; opacity: 0.6;
        }

        /* Container */
        .container {
            position: relative;
            width: 90vw;
            max-width: 1200px;
            height: 90vh;
            max-height: 900px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(212, 251, 6, 0.15);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(212, 251, 6, 0.1), inset 0 0 40px rgba(212, 251, 6, 0.05);
            overflow: hidden;
        }

        /* Left Panel */
        .left-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-y: auto;
            padding-right: 1rem;
        }

        .left-panel::-webkit-scrollbar {
            width: 6px;
        }

        .left-panel::-webkit-scrollbar-thumb {
            background: rgba(212, 251, 6, 0.3);
            border-radius: 3px;
        }

        .left-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        /* Profile Section */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1.5rem;
            padding: 2rem 0;
            border-bottom: 1px solid rgba(212, 251, 6, 0.1);
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid var(--lime-green);
            box-shadow: 0 0 20px rgba(212, 251, 6, 0.3);
        }

        .profile h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 600;
            margin: 0;
            color: var(--lime-green);
            text-shadow: 0 0 10px rgba(212, 251, 6, 0.5);
        }

        .profile p {
            font-family: var(--font-mono);
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        /* About Section */
        .about {
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(212, 251, 6, 0.1);
        }

        .about h2 {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            color: var(--lime-green);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .about p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-main);
            margin: 0;
        }

        /* Links Section */
        .links {
            padding: 1.5rem 0;
        }

        .links h2 {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            color: var(--lime-green);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-main);
            padding: 0.5rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .link-item:hover {
            background: rgba(212, 251, 6, 0.1);
            color: var(--lime-green);
            transform: translateX(4px);
        }

        .link-item::before {
            content: "→";
            color: var(--lime-green);
            font-weight: bold;
        }

        /* Right Panel - Memories Grid */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            padding-right: 1rem;
        }

        .right-panel::-webkit-scrollbar {
            width: 6px;
        }

        .right-panel::-webkit-scrollbar-thumb {
            background: rgba(212, 251, 6, 0.3);
            border-radius: 3px;
        }

        .right-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .memories-title {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            color: var(--lime-green);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .memories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            flex: 1;
        }

        .memory-card {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid rgba(212, 251, 6, 0.15);
            background: rgba(15, 23, 42, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .memory-card:hover {
            border-color: rgba(212, 251, 6, 0.5);
            box-shadow: 0 0 20px rgba(212, 251, 6, 0.2);
            transform: scale(1.05);
        }

        .memory-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .memory-card:hover img {
            transform: scale(1.1);
        }

        .memory-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(3, 4, 6, 0.95), transparent);
            padding: 1rem;
            max-height: 60%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .memory-card:hover .memory-overlay {
            opacity: 1;
        }

        .memory-overlay p {
            font-size: 0.75rem;
            line-height: 1.4;
            color: var(--text-main);
            margin: 0;
        }

        .memory-overlay .date {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--lime-green);
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(3, 4, 6, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(212, 251, 6, 0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            padding: 2rem;
            box-shadow: 0 0 60px rgba(212, 251, 6, 0.2);
        }

        .modal-image {
            max-width: 100%;
            max-height: 60vh;
            border-radius: 8px;
            border: 1px solid rgba(212, 251, 6, 0.2);
            object-fit: contain;
        }

        .modal-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1rem;
        }

        .modal-text h2 {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            color: var(--lime-green);
            margin: 0;
        }

        .modal-text p {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-main);
            margin: 0;
        }

        .modal-text .date {
            font-family: var(--font-mono);
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .modal-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
        }

        .modal-btn {
            background: rgba(212, 251, 6, 0.1);
            border: 1px solid rgba(212, 251, 6, 0.3);
            color: var(--lime-green);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.875rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .modal-btn:hover {
            background: rgba(212, 251, 6, 0.2);
            box-shadow: 0 0 10px rgba(212, 251, 6, 0.3);
        }

        .modal-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .close-btn {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: none;
            border: none;
            color: var(--lime-green);
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            text-shadow: 0 0 10px rgba(212, 251, 6, 0.5);
            transform: scale(1.2);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
                max-height: 100vh;
                height: 100vh;
                max-width: 100vw;
                width: 100vw;
                border-radius: 0;
                padding: 1rem;
            }

            .memories-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .profile h1 {
                font-size: 1.8rem;
            }

            .memories-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .modal-content {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0.75rem;
                gap: 1rem;
            }

            .profile h1 {
                font-size: 1.4rem;
            }

            .memories-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }

            .modal-content {
                padding: 1rem;
                gap: 1rem;
            }

            .close-btn {
                top: 1rem;
                right: 1rem;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Noise overlay -->
    <div class="noise-overlay"></div>

    <!-- Custom cursor -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- Main container -->
    <div class="container">
        <!-- Left Panel -->
        <div class="left-panel">
            <!-- Profile -->
            <div class="profile">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&h=200&fit=crop" alt="Marie Robin" class="profile-pic">
                <h1>Marie Robin</h1>
                <p>AI System Designer</p>
            </div>

            <!-- About -->
            <div class="about">
                <h2>About</h2>
                <p>I architect digital intelligence systems for creative agencies and brands. My work bridges human creativity with AI capability, ensuring every team member and AI agent operates in harmony.</p>
            </div>

            <!-- Links -->
            <div class="links">
                <h2>Links</h2>
                <div class="link-list">
                    <a href="https://fleetforward.tech" class="link-item">Fleet Forward</a>
                    <a href="https://marierobin.substack.com" class="link-item">Newsletter</a>
                    <a href="https://linkedin.com/in/marie-robin" class="link-item">LinkedIn</a>
                    <a href="https://twitter.com/marie" class="link-item">Twitter</a>
                </div>
            </div>
        </div>

        <!-- Right Panel - Memories -->
        <div class="right-panel">
            <h2 class="memories-title">Memories</h2>
            <div class="memories-grid" id="memories-grid"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <div class="modal-content">
            <img id="modal-image" src="" alt="Memory" class="modal-image">
            <div class="modal-text">
                <h2 id="modal-title"></h2>
                <p id="modal-description"></p>
                <p class="date" id="modal-date"></p>
            </div>
            <div class="modal-nav">
                <button class="modal-btn" onclick="previousMemory()" id="prev-btn">← Previous</button>
                <span id="memory-counter"></span>
                <button class="modal-btn" onclick="nextMemory()" id="next-btn">Next →</button>
            </div>
        </div>
    </div>

    <script>
        // Cursor tracking
        const cursor = {
            dot: document.getElementById('cursor-dot'),
            ring: document.getElementById('cursor-ring'),
            x: 0,
            y: 0
        };

        document.addEventListener('mousemove', (e) => {
            cursor.x = e.clientX;
            cursor.y = e.clientY;
            cursor.dot.style.left = cursor.x + 'px';
            cursor.dot.style.top = cursor.y + 'px';
            cursor.ring.style.left = cursor.x + 'px';
            cursor.ring.style.top = cursor.y + 'px';
        });

        // Memories data
        const memories = [
            {
                id: 1,
                title: "Founding Fleet Forward",
                description: "Started a mission to digitize the gray matter of creative agencies and brands, making human expertise mobilizable for AI agents.",
                date: "March 2024",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&h=500&fit=crop"
            },
            {
                id: 2,
                title: "Intelligence Factory Launch",
                description: "Unveiled the Intelligence Factory concept for creative agencies, automating knowledge workflows while keeping humans in the loop.",
                date: "June 2024",
                image: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=500&h=500&fit=crop"
            },
            {
                id: 3,
                title: "Brand OS Framework",
                description: "Developed Brand OS architecture for marketing teams to operationalize brand intelligence across their entire organization.",
                date: "August 2024",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&h=500&fit=crop"
            },
            {
                id: 4,
                title: "First Client Success",
                description: "Implemented Fleet Forward for a 50-person agency, resulting in a 40% reduction in repetitive creative work.",
                date: "September 2024",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&h=500&fit=crop"
            },
            {
                id: 5,
                title: "Scaling the Vision",
                description: "Expanded team to support growing demand from mid-size agencies across Europe. Focus on human-centered AI implementation.",
                date: "November 2024",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&h=500&fit=crop"
            },
            {
                id: 6,
                title: "Brand Partnerships",
                description: "Partnered with major brands to test Brand OS framework, proving the model works for enterprise-level marketing teams.",
                date: "January 2025",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&h=500&fit=crop"
            },
            {
                id: 7,
                title: "Thought Leadership",
                description: "Published manifesto on responsible AI in creative work, emphasizing value-first approach and human-AI collaboration.",
                date: "February 2025",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&h=500&fit=crop"
            },
            {
                id: 8,
                title: "Newsletter Growth",
                description: "Built engaged community through weekly insights on creative intelligence and AI-human partnership in marketing.",
                date: "Ongoing",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&h=500&fit=crop"
            },
            {
                id: 9,
                title: "Speaking Circuit",
                description: "Shared frameworks and learnings at industry conferences, helping creative leaders think differently about AI.",
                date: "2024-2025",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&h=500&fit=crop"
            },
            {
                id: 10,
                title: "Research & Audits",
                description: "Conducted deep-dive audits with clients to understand where human expertise gets lost, informing product roadmap.",
                date: "Quarterly",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&h=500&fit=crop"
            },
            {
                id: 11,
                title: "AI Skills Training",
                description: "Developed comprehensive training programs teaching creative teams how to work effectively with AI while maintaining creative control.",
                date: "Q4 2024",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&h=500&fit=crop"
            },
            {
                id: 12,
                title: "Community Building",
                description: "Created network of creative leaders, brand strategists, and AI practitioners sharing best practices and lessons learned.",
                date: "March 2025",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&h=500&fit=crop"
            },
            {
                id: 13,
                title: "Future Vision",
                description: "Building toward a world where every creative team has the tools to amplify their expertise through intelligent automation.",
                date: "2025+",
                image: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=500&h=500&fit=crop"
            }
        ];

        let currentMemoryIndex = 0;

        function renderMemories() {
            const grid = document.getElementById('memories-grid');
            grid.innerHTML = '';
            memories.forEach((memory, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.onclick = () => openModal(index);
                card.innerHTML = `
                    <img src="${memory.image}" alt="${memory.title}">
                    <div class="memory-overlay">
                        <p>${memory.title}</p>
                        <div class="date">${memory.date}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(index) {
            currentMemoryIndex = index;
            updateModal();
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function updateModal() {
            const memory = memories[currentMemoryIndex];
            document.getElementById('modal-image').src = memory.image;
            document.getElementById('modal-title').textContent = memory.title;
            document.getElementById('modal-description').textContent = memory.description;
            document.getElementById('modal-date').textContent = memory.date;
            document.getElementById('memory-counter').textContent = `${currentMemoryIndex + 1} / ${memories.length}`;
            
            document.getElementById('prev-btn').disabled = currentMemoryIndex === 0;
            document.getElementById('next-btn').disabled = currentMemoryIndex === memories.length - 1;
        }

        function previousMemory() {
            if (currentMemoryIndex > 0) {
                currentMemoryIndex--;
                updateModal();
            }
        }

        function nextMemory() {
            if (currentMemoryIndex < memories.length - 1) {
                currentMemoryIndex++;
                updateModal();
            }
        }

        // Close modal on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
            if (e.key === 'ArrowLeft') {
                previousMemory();
            }
            if (e.key === 'ArrowRight') {
                nextMemory();
            }
        });

        // Close modal on outside click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal')) {
                closeModal();
            }
        });

        // Initialize
        renderMemories();

        // Responsive height adjustment
        function adjustHeight() {
            if (window.innerWidth <= 1024) {
                document.querySelector('.container').style.maxHeight = 'fit-content';
            } else {
                document.querySelector('.container').style.maxHeight = '900px';
            }
        }

        window.addEventListener('resize', () => {
            adjustHeight();
            document.querySelector('.container').style.width = '90vw';
            document.querySelector('.container').style.height = '90vh';
            document.querySelector('.container').style.maxWidth = '1200px';
            document.querySelector('.container').style.maxHeight = window.innerHeight > window.innerWidth ? 'fit-content' : '900px';
        });

        adjustHeight();
        window.addEventListener('resize', () => {
            document.querySelector('.container').style.width = '90vw';
            document.querySelector('.container').style.height = '90vh';
            document.querySelector('.container').style.maxWidth = '1200px';
            document.querySelector('.container').style.maxHeight = window.innerHeight > window.innerWidth ? 'fit-content' : '900px';
        });
    </script>
</body>
</html>
